services:
  # ── PostgreSQL database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: upath_db
      POSTGRES_USER: ${DB_USER:-upath}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/docker-init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-upath} -d upath_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ASP.NET Core API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=upath_db;Username=${DB_USER:-upath};Password=${DB_PASSWORD}"
      AllowedOrigins: "https://upath.tannernielson.com"
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:4000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── React/Vite frontend (served by nginx) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://upath.tannernielson.com}
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx reverse proxy (public-facing) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal

  # ── Certbot (SSL cert renewal) ───────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
