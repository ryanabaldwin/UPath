events {
    worker_connections 1024;
}

http {
    # ── HTTP: redirect to HTTPS + serve ACME challenge ──────────────────────
    server {
        listen 80;
        server_name upath.tannernielson.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name upath.tannernielson.com;

        ssl_certificate     /etc/letsencrypt/live/upath.tannernielson.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/upath.tannernielson.com/privkey.pem;

        include     /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # API requests → .NET backend
        location /api/ {
            proxy_pass         http://backend:4000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Everything else → React SPA
        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
